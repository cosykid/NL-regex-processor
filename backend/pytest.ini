[pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = test_*.py
# --reuse-db: keep the Neon test database between runs instead of dropping it.
# Dropping is unreliable through Neon's connection pooler (it holds a session,
# so DROP DATABASE hits "database is being accessed by other users", and the
# NEXT run then fails to (re)create it). Reusing sidesteps that and is much
# faster against a remote DB. After changing models/migrations, refresh once
# with:  python -m pytest --create-db
addopts = -q --reuse-db
