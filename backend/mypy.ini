[mypy]
plugins = mypy_django_plugin.main
# Django model fields (CharField, JSONField, ...) resolve to their Python types
# only when the django-stubs plugin runs. Without it every field reads as an
# untyped descriptor and mypy emits a spurious "Need type annotation" error.

[mypy.plugins.django-stubs]
django_settings_module = config.settings

# Third-party packages that ship no type information. Ignore rather than fail so
# the checker stays quiet on imports we don't control.
[mypy-boto3.*]
ignore_missing_imports = True

[mypy-botocore.*]
ignore_missing_imports = True

[mypy-redis.*]
ignore_missing_imports = True

[mypy-anthropic.*]
ignore_missing_imports = True

[mypy-openpyxl.*]
ignore_missing_imports = True
