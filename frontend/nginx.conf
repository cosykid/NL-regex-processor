server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Large uploads stream straight through to the backend.
    client_max_body_size 2048M;

    # Use Docker's embedded DNS and a runtime variable for the upstream so nginx
    # re-resolves `backend` per request instead of caching one IP at startup.
    # This keeps the proxy working when the backend container is restarted or
    # rescheduled (and is required for scaling it).
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/ {
        set $backend http://backend:8000;
        proxy_pass $backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_request_buffering off;
    }

    location = /healthz {
        set $backend http://backend:8000;
        proxy_pass $backend$request_uri;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
